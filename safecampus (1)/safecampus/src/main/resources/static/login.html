<!DOCTYPE html>
<html>
<head>
    <title>SafeCampus Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card p-4 shadow bg-light text-dark">

                <h3 class="text-center">🔐 Admin Login</h3>

                <input type="text" id="username" class="form-control mt-3" placeholder="Username">

                <input type="password" id="password" class="form-control mt-3" placeholder="Password">

                <button class="btn btn-dark mt-3" onclick="login()">Login</button>

                <p id="error" class="text-danger mt-2"></p>

            </div>

        </div>

    </div>

</div>

<script>

    function login(){

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user=="admin" && pass=="1234"){

    localStorage.setItem("loggedIn","true");
    window.location.href="/dashboard.html";

    }else{

    document.getElementById("error").innerText="Invalid Credentials";

    }

    }

</script>

</body>
</html>
